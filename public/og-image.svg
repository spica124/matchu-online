<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#7c3aed" flood-opacity="0.6"/>
    </filter>
    <filter id="iconGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#a78bfa" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="100" r="340" fill="url(#glow)" opacity="0.6"/>
  <circle cx="100" cy="560" r="200" fill="url(#glow)" opacity="0.35"/>

  <!-- 상단 바 -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- 아이콘 3개 (오른쪽) -->
  <!-- 게임패드 (id=2073) -->
  <rect x="740" y="110" width="160" height="160" rx="32" fill="#7c3aed" opacity="0.9" filter="url(#iconGlow)"/>
  <image href="https://img.icons8.com/?size=100&amp;id=2073&amp;format=png&amp;color=FFFFFF" x="760" y="130" width="120" height="120"/>

  <!-- 음악 노트 (id=51F0o6bWwYMt) -->
  <rect x="920" y="110" width="160" height="160" rx="32" fill="#2563eb" opacity="0.9" filter="url(#iconGlow)"/>
  <image href="https://img.icons8.com/?size=100&amp;id=51F0o6bWwYMt&amp;format=png&amp;color=FFFFFF" x="940" y="130" width="120" height="120"/>

  <!-- 사람들 (id=100005) -->
  <rect x="830" y="290" width="160" height="160" rx="32" fill="#4f46e5" opacity="0.9" filter="url(#iconGlow)"/>
  <image href="https://img.icons8.com/?size=100&amp;id=100005&amp;format=png&amp;color=FFFFFF" x="850" y="310" width="120" height="120"/>

  <!-- 메인 타이틀 -->
  <text x="80" y="240" font-family="'Apple SD Gothic Neo','Nanum Gothic',sans-serif" font-size="104" font-weight="900" fill="white" filter="url(#shadow)">마추기온라인</text>

  <!-- 구분선 -->
  <rect x="80" y="268" width="620" height="5" fill="url(#accent)" rx="3"/>

  <!-- 서브타이틀 -->
  <text x="80" y="340" font-family="'Apple SD Gothic Neo','Nanum Gothic',sans-serif" font-size="44" font-weight="700" fill="#a78bfa">애니 · 노래 · 장면 퀴즈 배틀</text>

  <!-- 설명 -->
  <text x="80" y="408" font-family="'Apple SD Gothic Neo','Nanum Gothic',sans-serif" font-size="28" fill="#6b7280">친구들과 실시간으로 즐기는 멀티플레이 퀴즈 게임</text>

  <!-- BATTLE 배지 -->
  <rect x="80" y="460" width="160" height="48" rx="24" fill="url(#accent)" opacity="0.9"/>
  <text x="160" y="491" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="white">⚔ BATTLE</text>

  <!-- 하단 URL -->
  <text x="80" y="578" font-family="monospace" font-size="24" fill="#4b5563">matchu-online.onrender.com</text>
</svg>
